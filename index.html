<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ademi 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Great+Vibes&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #ffb7c5; --gold: #d4af7a; --dark: #06040a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--dark);
            font-family: 'Montserrat', sans-serif;
            color: #fff;
        }
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: url("myphoto.jpg") center/cover no-repeat;
            filter: brightness(0.15) saturate(0.5);
            animation: bgBreath 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes bgBreath {
            0%,100% { transform: scale(1); filter: brightness(0.15) saturate(0.5); }
            50% { transform: scale(1.04); filter: brightness(0.22) saturate(0.7); }
        }
        .vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 20%, rgba(6,4,10,0.93) 100%);
        }
        .grid {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,183,197,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,183,197,0.04) 1px, transparent 1px);
            background-size: 55px 55px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { to { background-position: 55px 55px; } }
        .star {
            position: fixed; border-radius: 50%; background: white;
            pointer-events: none; z-index: 3;
            animation: twinkle ease-in-out infinite;
        }
        @keyframes twinkle { 0%,100% { opacity: 0.05; } 50% { opacity: 1; } }
        .spark {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 4;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-5vh); opacity: 0; }
        }

        /* ПОРТАЛ - pointer-events: none на всём */
        #portal {
            position: fixed; inset: 0; z-index: 5;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
        }
        #portal.exit { animation: exitAnim 1.6s ease forwards; }
        @keyframes exitAnim {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(2.5); filter: blur(25px); }
        }
        .aura {
            position: absolute; width: 340px; height: 340px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,197,0.1) 0%, transparent 70%);
            animation: auraPulse 3s ease-in-out infinite; pointer-events: none;
        }
        @keyframes auraPulse {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .rings {
            position: relative; width: 240px; height: 240px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 48px; pointer-events: none;
        }
        .r { position: absolute; border-radius: 50%; border: 1px solid rgba(255,183,197,0.3); animation: rPulse 3.5s ease-in-out infinite; pointer-events: none; }
        .r1 { width: 240px; height: 240px; }
        .r2 { width: 195px; height: 195px; animation-delay: 0.5s; }
        .r3 { width: 150px; height: 150px; animation-delay: 1s; }
        .r4 { width: 265px; height: 265px; border: 1px dashed rgba(255,183,197,0.12); animation: spinCW 12s linear infinite; }
        .r5 { width: 290px; height: 290px; border: 1px dashed rgba(212,175,122,0.1); animation: spinCCW 18s linear infinite; }
        @keyframes rPulse { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes spinCW { to { transform: rotate(360deg); } }
        @keyframes spinCCW { to { transform: rotate(-360deg); } }
        .saske {
            width: 155px; position: relative; z-index: 2; pointer-events: none;
            filter: drop-shadow(0 0 30px rgba(255,183,197,0.5));
            animation: floatUp 6s ease-in-out infinite;
            mask-image: linear-gradient(to bottom, black 78%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, black 78%, transparent);
        }
        @keyframes floatUp {
            0%,100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 30px rgba(255,183,197,0.5)) brightness(1); }
            50% { transform: translateY(-20px) scale(1.05); filter: drop-shadow(0 0 60px rgba(255,183,197,0.8)) brightness(1.3); }
        }
        .hint {
            font-size: 0.5rem; letter-spacing: 10px; text-transform: uppercase;
            color: var(--rose); pointer-events: none;
            animation: hintPulse 2.5s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,100% { opacity: 0.2; letter-spacing: 10px; }
            50% { opacity: 0.9; letter-spacing: 13px; }
        }

        /* ГЛАВНАЯ КНОПКА — z-index выше всего */
        #btn-start {
            position: fixed; inset: 0;
            z-index: 99999;
            background: transparent; border: none; outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            cursor: pointer;
            width: 100%; height: 100%;
        }

        #flash {
            position: fixed; inset: 0; z-index: 9000;
            background: radial-gradient(circle at center, rgba(255,210,220,0.8), rgba(255,183,197,0.3) 50%, transparent);
            opacity: 0; pointer-events: none;
        }

        /* ИГРА */
        #game {
            position: fixed; inset: 0; z-index: 60;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 30px;
            opacity: 0; pointer-events: none;
        }
        #game.show {
            pointer-events: all;
            animation: fadeIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .progress { display: flex; gap: 10px; margin-bottom: 32px; }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(255,183,197,0.15);
            transition: background 0.5s, transform 0.5s;
        }
        .dot.active { background: rgba(255,183,197,0.5); transform: scale(1.2); }
        .dot.done { background: var(--rose); transform: scale(1.4); box-shadow: 0 0 8px rgba(255,183,197,0.6); }
        .no-msg {
            min-height: 20px; margin-bottom: 20px; text-align: center;
            font-size: 0.65rem; letter-spacing: 3px;
            color: rgba(255,183,197,0.5);
        }
        .no-msg.pop { animation: msgPop 0.4s ease forwards; }
        @keyframes msgPop {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .q-wrap { text-align: center; margin-bottom: 50px; max-width: 320px; }
        .q-label {
            display: block; font-size: 0.48rem; letter-spacing: 7px;
            text-transform: uppercase; color: rgba(255,183,197,0.35); margin-bottom: 18px;
        }
        .q-text {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: clamp(1.25rem, 5.5vw, 1.6rem);
            font-weight: 300; line-height: 1.55; color: #fff;
        }
        .q-text.anim { animation: qAppear 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes qAppear {
            0% { opacity: 0; transform: translateY(16px); filter: blur(6px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* КНОПКИ ДА / НЕТ */
        .btns-row {
            display: flex; flex-direction: row;
            align-items: center; justify-content: center;
            gap: 24px; width: 100%;
            position: relative;
        }
        .ans {
            width: 130px; padding: 16px 0;
            border-radius: 60px; border: 1px solid;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase;
            outline: none; cursor: pointer; text-align: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            /* ВАЖНО: убираем transition на position чтобы не тормозило */
        }
        .ans-yes {
            background: rgba(255,183,197,0.1);
            border-color: rgba(255,183,197,0.5);
            color: var(--rose);
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .ans-yes.pulse {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255,183,197,0.5);
        }
        .ans-no {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.35);
            flex-shrink: 0;
        }
        .ans-no.flying {
            position: fixed;
            transition: left 0.22s cubic-bezier(0.34,1.56,0.64,1),
                        top 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }

        #yes-popup {
            position: fixed; inset: 0; z-index: 9500;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none; opacity: 0;
        }
        #yes-popup.show { animation: popIn 2s ease forwards; }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.4); }
            20% { opacity: 1; transform: scale(1.15); }
            40% { transform: scale(1); }
            75% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.05); }
        }
        .pop-emoji { font-size: 5.5rem; display: block; margin-bottom: 14px; }
        .pop-text {
            font-family: 'Great Vibes', cursive; font-size: 2rem;
            color: var(--rose); text-shadow: 0 0 30px rgba(255,183,197,0.9);
            text-align: center; padding: 0 20px;
        }

        /* ПОЗДРАВЛЕНИЕ */
        #content {
            position: fixed; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 30px 20px; overflow-y: auto;
            opacity: 0; pointer-events: none;
        }
        #content.show {
            pointer-events: all;
            animation: fadeIn 2s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .photo-wrap { position: relative; margin-bottom: 22px; }
        .photo-glow {
            position: absolute; inset: -40px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,197,0.3) 0%, transparent 70%);
            animation: glowPulse 3.5s ease-in-out infinite; pointer-events: none;
        }
        @keyframes glowPulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
        .photo-ring1 {
            position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid rgba(255,183,197,0.4);
            animation: spinCW 8s linear infinite; pointer-events: none;
        }
        .photo-ring1::after {
            content: ''; position: absolute;
            top: -4px; left: 50%; margin-left: -4px;
            width: 8px; height: 8px; background: var(--rose); border-radius: 50%;
            box-shadow: 0 0 12px 4px rgba(255,183,197,0.8);
        }
        .photo-ring2 {
            position: absolute; inset: -20px; border-radius: 50%;
            border: 1px dashed rgba(212,175,122,0.2);
            animation: spinCCW 14s linear infinite; pointer-events: none;
        }
        .photo {
            width: 115px; height: 115px; border-radius: 50%;
            object-fit: cover; display: block; position: relative; z-index: 2;
            opacity: 0; transform: scale(0.4) rotate(-15deg);
            transition: opacity 1.2s ease 0.3s, transform 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s;
        }
        #content.show .photo { opacity: 1; transform: scale(1) rotate(0deg); }
        .name-clip { overflow: hidden; margin-bottom: 4px; }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(4rem, 17vw, 6.5rem);
            font-weight: 400; line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--rose) 45%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            opacity: 0; transform: translateY(100%) skewX(-4deg);
            transition: opacity 1s ease 0.8s, transform 1s cubic-bezier(0.16,1,0.3,1) 0.8s;
        }
        #content.show h1 { opacity: 1; transform: translateY(0) skewX(0); }
        .sub {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase;
            color: rgba(255,255,255,0.32); margin-bottom: 18px;
            opacity: 0; transition: opacity 1s ease 1.4s;
        }
        #content.show .sub { opacity: 1; }
        .divider {
            display: flex; align-items: center; gap: 12px;
            width: 230px; margin-bottom: 18px;
            opacity: 0; transition: opacity 1s ease 1.7s;
        }
        #content.show .divider { opacity: 1; }
        .dl { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(255,183,197,0.5), transparent); }
        .di { color: var(--rose); font-size: 0.65rem; animation: spinCW 6s linear infinite; }
        #msg {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.97rem, 4.3vw, 1.1rem);
            font-weight: 300; line-height: 2.1;
            color: rgba(255,255,255,0.88); text-align: center; max-width: 440px;
        }
        .lt { display: inline; opacity: 0; filter: blur(8px); transition: opacity 0.5s, filter 0.5s; }
        .lt.on { opacity: 1; filter: blur(0); }
        .sig {
            margin-top: 22px; opacity: 0;
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem; color: var(--gold); letter-spacing: 2px;
            transition: opacity 2.5s ease;
            text-shadow: 0 0 20px rgba(212,175,122,0.5);
        }
        .petal { position: fixed; pointer-events: none; z-index: 6; animation: fall linear forwards; }
        @keyframes fall {
            0% { opacity: 0; transform: translateY(-30px) rotate(0deg) scale(0.5); }
            8% { opacity: 0.9; } 92% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(108vh) rotate(580deg) scale(1.1); }
        }
        .heart { position: fixed; pointer-events: none; z-index: 6; animation: heartUp ease-out forwards; }
        @keyframes heartUp {
            0% { opacity: 0; transform: translateY(0) scale(0.3); }
            15% { opacity: 1; } 85% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-65vh) scale(1.1) rotate(10deg); }
        }
        .ripple {
            position: fixed; border-radius: 50%;
            border: 2px solid rgba(255,183,197,0.8);
            pointer-events: none; z-index: 8000;
            transform: translate(-50%,-50%);
            animation: rippleOut 1s ease-out forwards;
        }
        @keyframes rippleOut { 0% { width:0; height:0; opacity:1; } 100% { width:450px; height:450px; opacity:0; } }
        .confetti { position: fixed; pointer-events: none; z-index: 9100; animation: cFall linear forwards; }
        @keyframes cFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(700deg); opacity: 0; }
        }
        .pusi {
            position: fixed; bottom: 20px; right: 20px;
            width: 46px; opacity: 0.2; z-index: 300; pointer-events: none;
            animation: floatUp 4s ease-in-out infinite;
        }
        @keyframes floatUp {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="vignette"></div>
<div class="grid"></div>
<div id="flash"></div>

<!-- ПОРТАЛ - всё pointer-events: none -->
<div id="portal">
    <div class="aura"></div>
    <div class="rings">
        <div class="r r5"></div>
        <div class="r r4"></div>
        <div class="r r1"></div>
        <div class="r r2"></div>
        <div class="r r3"></div>
        <img src="Saske.png" class="saske" alt="">
    </div>
    <div class="hint">✦ Прикоснись к вечности ✦</div>
</div>

<!-- КНОПКА - единственная кликабельная зона, поверх всего -->
<button id="btn-start" onclick="startApp(event)"></button>

<!-- ИГРА -->
<div id="game">
    <div class="progress" id="progress"></div>
    <div class="no-msg" id="no-msg"></div>
    <div class="q-wrap">
        <span class="q-label">вопрос для тебя</span>
        <div class="q-text" id="q-text"></div>
    </div>
    <div class="btns-row">
        <button class="ans ans-yes" id="btn-yes" onclick="handleYes()">Да 💖</button>
        <button class="ans ans-no"  id="btn-no"  onclick="handleNo(event)">Нет</button>
    </div>
</div>

<!-- РЕАКЦИЯ -->
<div id="yes-popup">
    <span class="pop-emoji" id="pop-emoji"></span>
    <span class="pop-text"  id="pop-text"></span>
</div>

<!-- ПОЗДРАВЛЕНИЕ -->
<div id="content">
    <div class="photo-wrap">
        <div class="photo-glow"></div>
        <div class="photo-ring2"></div>
        <div class="photo-ring1"></div>
        <img src="photo.jpg" class="photo" alt="Ademi">
    </div>
    <div class="name-clip"><h1>Ademi</h1></div>
    <p class="sub">вечная · бесконечная · единственная</p>
    <div class="divider">
        <div class="dl"></div><span class="di">✦</span><div class="dl"></div>
    </div>
    <div id="msg"></div>
    <div class="sig" id="sig"></div>
</div>

<img src="pusi.png" class="pusi" alt="">
<audio id="audio" loop preload="auto">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
const QUESTIONS = [
    { q: "Ты считаешь меня своим другом? 🤍", emoji: "🥹", reply: "Это для меня всё значит!" },
    { q: "Ты знаешь, что твоя улыбка меняет настроение всем вокруг? 🌟", emoji: "✨", reply: "Это чистая правда!" },
    { q: "Веришь, что ты достойна самого лучшего? 👑", emoji: "💫", reply: "Именно так и есть!" },
    { q: "Готова увидеть кое-что особенное для тебя? 🎁", emoji: "🌸", reply: "Тогда смотри..." }
];

const TEXT = `Адеми, есть люди, которые просто существуют рядом — а есть те, чьё присутствие меняет всё вокруг. Ты — вторая. 💞

Твоя улыбка способна осветить самый тёмный день, а твой характер восхищает всё больше с каждым разом. Ты сильная, добрая и по-настоящему особенная. 🌟

Я искренне рад, что ты есть в моей жизни. Пусть каждый твой день будет наполнен теплом, радостью и людьми, которые ценят тебя так же сильно, как ты того заслуживаешь. ✨`;

const SIG = "— Твой Урмат 🫶🏻";

/* ЗВЁЗДЫ */
for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() > 0.85 ? 3 : Math.random() > 0.6 ? 2 : 1;
    s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${sz}px;height:${sz}px;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*6}s;`;
    document.body.appendChild(s);
}
/* ОГНИ */
const SC = ['rgba(255,183,197,0.8)','rgba(212,175,122,0.7)','rgba(255,255,255,0.5)'];
for (let i = 0; i < 22; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    const sz = Math.random()*3+1;
    sp.style.cssText = `left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${SC[Math.floor(Math.random()*3)]};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
    document.body.appendChild(sp);
}

/* СТАРТ */
let launched = false;
function startApp(e) {
    if (launched) return;
    launched = true;

    const audio = document.getElementById('audio');
    audio.volume = 1.0;
    audio.play().catch(() => {});

    document.getElementById('btn-start').style.display = 'none';

    const x = e.clientX || window.innerWidth / 2;
    const y = e.clientY || window.innerHeight / 2;

    const rip = document.createElement('div');
    rip.className = 'ripple';
    rip.style.left = x + 'px';
    rip.style.top  = y + 'px';
    document.body.appendChild(rip);
    setTimeout(() => rip.remove(), 1100);

    doFlash(0,'1'); doFlash(180,'0.15'); doFlash(290,'0.7'); doFlash(550,'0');

    document.getElementById('portal').classList.add('exit');
    setTimeout(() => {
        document.getElementById('portal').style.display = 'none';
        initGame();
    }, 1600);
}

/* ИГРА */
let qIdx = 0;
let noCount = 0;
let noFlying = false;
let noBtnFixed = false;
let yesLocked = false;

function initGame() {
    const prog = document.getElementById('progress');
    QUESTIONS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.id = 'dot' + i;
        prog.appendChild(d);
    });
    showQ(0);
    document.getElementById('game').classList.add('show');
}

function showQ(idx) {
    noCount = 0;
    noBtnFixed = false;
    noFlying = false;

    const btn = document.getElementById('btn-no');
    btn.classList.remove('flying');
    btn.style.left = '';
    btn.style.top = '';

    const msgEl = document.getElementById('no-msg');
    msgEl.textContent = '';
    msgEl.classList.remove('pop');

    const qt = document.getElementById('q-text');
    qt.classList.remove('anim');
    qt.textContent = QUESTIONS[idx].q;
    void qt.offsetWidth;
    qt.classList.add('anim');
}

const NO_MSGS = [
    'Попробуй ещё раз 😏','Это не вариант 😄','Ты же знаешь ответ 😊',
    'Не туда жмёшь! 🤭','Упрямая! 😂','Кнопка ДА ждёт тебя 🥺',
    'Я буду убегать вечно 😜','Ну давай же! 🌸','Последний шанс... 😅','Всё равно не сдамся! 💪'
];

function handleNo(e) {
    if (noFlying) return;
    noFlying = true;
    noCount++;

    const msgEl = document.getElementById('no-msg');
    msgEl.textContent = NO_MSGS[(noCount - 1) % NO_MSGS.length];
    msgEl.classList.remove('pop');
    void msgEl.offsetWidth;
    msgEl.classList.add('pop');

    const btnY = document.getElementById('btn-yes');
    btnY.classList.add('pulse');
    setTimeout(() => btnY.classList.remove('pulse'), 400);

    const btn = document.getElementById('btn-no');
    const bw = 130; const bh = 52; const margin = 24;
    const newX = margin + Math.random() * (window.innerWidth  - bw - margin * 2);
    const newY = margin + Math.random() * (window.innerHeight - bh - margin * 2);

    if (!noBtnFixed) {
        const rect = btn.getBoundingClientRect();
        btn.style.left = rect.left + 'px';
        btn.style.top  = rect.top  + 'px';
        btn.classList.add('flying');
        noBtnFixed = true;
        requestAnimationFrame(() => requestAnimationFrame(() => {
            btn.style.left = newX + 'px';
            btn.style.top  = newY + 'px';
        }));
    } else {
        btn.style.left = newX + 'px';
        btn.style.top  = newY + 'px';
    }

    setTimeout(() => { noFlying = false; }, 280);
}

function handleYes() {
    if (yesLocked) return;
    yesLocked = true;

    spawnConfetti();

    const popup = document.getElementById('yes-popup');
    document.getElementById('pop-emoji').textContent = QUESTIONS[qIdx].emoji;
    document.getElementById('pop-text').textContent  = QUESTIONS[qIdx].reply;
    popup.classList.remove('show');
    void popup.offsetWidth;
    popup.classList.add('show');

    const dot = document.getElementById('dot' + qIdx);
    if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }

    setTimeout(() => {
        qIdx++;
        yesLocked = false;
        if (qIdx < QUESTIONS.length) {
            const next = document.getElementById('dot' + qIdx);
            if (next) next.classList.add('active');
            showQ(qIdx);
        } else {
            endGame();
        }
    }, 2000);
}

function endGame() {
    const game = document.getElementById('game');
    game.style.transition = 'opacity 0.8s';
    game.style.opacity = '0';
    game.style.pointerEvents = 'none';
    setTimeout(() => {
        game.style.display = 'none';
        showCongrats();
    }, 800);
}

function showCongrats() {
    doFlash(0,'0.7'); doFlash(500,'0');
    document.getElementById('content').classList.add('show');
    startPetals();
    startHearts();
    setTimeout(typeText, 2400);
}

function typeText() {
    const el = document.getElementById('msg');
    const chars = TEXT.split('');
    let i = 0;
    function next() {
        if (i >= chars.length) {
            setTimeout(() => {
                const s = document.getElementById('sig');
                s.textContent = SIG;
                s.style.opacity = '1';
                for (let k = 0; k < 12; k++) setTimeout(oneHeart, k * 180);
            }, 600);
            return;
        }
        const c = chars[i];
        if (c === '\n') {
            el.appendChild(document.createElement('br'));
            if (chars[i+1] === '\n') { el.appendChild(document.createElement('br')); i++; }
        } else {
            const sp = document.createElement('span');
            sp.className = 'lt'; sp.textContent = c;
            el.appendChild(sp);
            requestAnimationFrame(() => requestAnimationFrame(() => sp.classList.add('on')));
        }
        i++;
        setTimeout(next, c === ' ' ? 14 : 30);
    }
    next();
}

function doFlash(delay, val) {
    setTimeout(() => { document.getElementById('flash').style.opacity = val; }, delay);
}

function spawnConfetti() {
    const colors = ['#ffb7c5','#d4af7a','#fff','#ff85a1','#ffd700','#c9b1ff'];
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random()*100 + 'vw';
            c.style.top = '-10px';
            c.style.width  = (6 + Math.random()*6) + 'px';
            c.style.height = (6 + Math.random()*6) + 'px';
            c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            c.style.animationDuration = (1.5 + Math.random()*2) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }, i * 30);
    }
}

const petalList = ['🌸','🌺','✿','❀','🌼'];
function onePetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalList[Math.floor(Math.random()*petalList.length)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.fontSize = (7 + Math.random()*12) + 'px';
    const d = 7 + Math.random()*9;
    p.style.animationDuration = d + 's';
    document.body.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); onePetal(); }, d*1000);
}
function startPetals() {
    for (let i = 0; i < 14; i++) setTimeout(onePetal, i*450);
}

const heartList = ['💞','💖','💗','💕','✨','🌸'];
function oneHeart() {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartList[Math.floor(Math.random()*heartList.length)];
    h.style.left   = (15 + Math.random()*70) + 'vw';
    h.style.bottom = (5  + Math.random()*15) + 'vh';
    h.style.fontSize = (14 + Math.random()*12) + 'px';
    h.style.animationDuration = (2 + Math.random()*2.5) + 's';
    document.body.appendChild(h);
    setTimeout(() => { if (h.parentNode) h.remove(); }, 5000);
}
function startHearts() {
    oneHeart();
    setInterval(oneHeart, 3000);
}
</script>
